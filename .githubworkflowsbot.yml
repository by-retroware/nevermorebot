name: Run Nevermore Bot

on:
  schedule:
    # Запускать каждые 5 минут (можно настроить)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
        run: python bot.py
        timeout-minutes: 6  # Немного больше чем время работы бота